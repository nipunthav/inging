<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inging Rubcase v1.1</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #2b2f34;
      --panel: #383d44;
      --panel-2: #30343a;
      --input: #24282d;
      --border: #5c6470;
      --text: #e5e7eb;
      --muted: #aeb6c2;
      --accent: #d1d5db;
      --accent-text: #111827;
      --success: #bbf7d0;
      --warning: #fde68a;
    }

    body {
      margin: 0;
      font-family: Arial, Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(96vw, 1240px);
      margin: 20px auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.55rem;
      color: #f9fafb;
    }

    .version {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .tab {
      margin: 0;
      background: #555b63;
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 0.9rem;
      padding: 10px 6px;
    }

    .tab.active {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 700;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 5px;
      font-weight: 700;
      color: #f3f4f6;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: var(--input);
      color: #f9fafb;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      white-space: pre-wrap;
    }

    #output {
      min-height: 600px;
      font-size: 1rem;
      line-height: 1.45;
      background: #20242a;
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .sex-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sex-row button {
      margin-top: 0;
      background: #555b63;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .sex-row button.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 700;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .secondary {
      background: #555b63;
      color: #f3f4f6;
      border: 1px solid var(--border);
    }

    .danger {
      background: #7f1d1d;
      color: #fee2e2;
      border: 1px solid #991b1b;
    }

    .hint {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 5px;
    }

    #status {
      min-height: 24px;
      margin-bottom: 0;
      color: var(--success);
      font-weight: 700;
    }

    .template-note {
      margin-top: 0;
      color: var(--warning);
      font-size: 0.9rem;
    }

    @media (max-width: 850px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .tabs {
        grid-template-columns: 1fr 1fr;
      }

      #output {
        min-height: 360px;
      }

      .row-2,
      .row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1>Inging Rubcase</h1>
        <div class="version">v1.1 — GitHub Pages ready, iPhone-friendly LINE message generator</div>
      </div>
    </div>

    <section class="layout">
      <div class="panel">
        <div class="tabs">
          <button type="button" class="tab active" id="tab-new" onclick="setTemplate('new')">รับใหม่</button>
          <button type="button" class="tab" id="tab-progress" onclick="setTemplate('progress')">Progress</button>
          <button type="button" class="tab" id="tab-consult" onclick="setTemplate('consult')">Consult</button>
          <button type="button" class="tab" id="tab-discharge" onclick="setTemplate('discharge')">Discharge</button>
        </div>

        <p class="template-note" id="templateNote">Template: รับใหม่</p>

        <label for="teacher">Teacher name</label>
        <input id="teacher" list="teacherList" type="text" placeholder="ชื่ออาจารย์" />
        <datalist id="teacherList"></datalist>
        <button type="button" class="secondary" onclick="saveTeacherFavorite()">Save teacher favorite</button>

        <label for="ward">Ward name</label>
        <input id="ward" type="text" placeholder="เช่น LR, PP, GYN" />

        <label for="patient">Patient name</label>
        <input id="patient" type="text" placeholder="ชื่อผู้ป่วย" />

        <div class="row-2">
          <div>
            <label>Sex</label>
            <div class="sex-row">
              <button type="button" id="maleBtn" class="active" onclick="setSex('Male')">Male</button>
              <button type="button" id="femaleBtn" onclick="setSex('Female')">Female</button>
            </div>
          </div>

          <div>
            <label for="age">Age</label>
            <input id="age" type="number" min="0" placeholder="อายุ" />
          </div>
        </div>

        <label for="hn">HN</label>
        <input id="hn" type="text" placeholder="HN" />

        <label for="ud">U/D</label>
        <textarea id="ud" placeholder="โรคประจำตัว เช่น DM, HT, no known U/D"></textarea>

        <label for="problem">Problem List</label>
        <textarea id="problem" placeholder="ใส่ problem list แยกบรรทัดได้"></textarea>
        <div class="hint">Each line will be kept as a new line. You can write bullets yourself or leave plain text.</div>

        <label for="plan">Plan</label>
        <textarea id="plan" placeholder="ใส่แผนการรักษา แยกบรรทัดได้"></textarea>
        <div class="hint">Each line will automatically become “- ...”.</div>

        <div id="extraFields"></div>

        <div class="row-3">
          <button type="button" onclick="generateMessage()">Generate</button>
          <button type="button" class="secondary" onclick="clearCaseOnly()">Clear case</button>
          <button type="button" class="danger" onclick="clearAllData()">Reset all</button>
        </div>
      </div>

      <div class="panel">
        <label for="output">Generated message</label>
        <textarea id="output" readonly></textarea>

        <div class="row-2">
          <button type="button" onclick="copyMessage()">Copy</button>
          <button type="button" class="secondary" onclick="exportTextFile()">Export .txt</button>
        </div>

        <p id="status"></p>
      </div>
    </section>
  </main>

  <script>
    let selectedSex = "Male";
    let currentTemplate = "new";

    const baseFields = ["teacher", "ward", "patient", "age", "hn", "ud", "problem", "plan"];
    const templateNotes = {
      new: "Template: รับใหม่",
      progress: "Template: Progress note",
      consult: "Template: Consult",
      discharge: "Template: Discharge"
    };

    const extraFieldHtml = {
      new: "",
      progress: `
        <label for="progressNote">Progress note</label>
        <textarea id="progressNote" placeholder="อาการวันนี้ / clinical update"></textarea>
      `,
      consult: `
        <label for="consultTo">Consult to</label>
        <input id="consultTo" type="text" placeholder="เช่น Med, Surg, Anes" />

        <label for="consultQuestion">Consult question</label>
        <textarea id="consultQuestion" placeholder="ต้องการ consult เรื่องอะไร"></textarea>
      `,
      discharge: `
        <label for="dx">Diagnosis</label>
        <textarea id="dx" placeholder="Final diagnosis"></textarea>

        <label for="dischargeMed">Discharge medication</label>
        <textarea id="dischargeMed" placeholder="ยา discharge"></textarea>

        <label for="followUp">Follow-up</label>
        <textarea id="followUp" placeholder="นัด follow-up"></textarea>
      `
    };

    function valueOf(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function setSex(sex) {
      selectedSex = sex;
      document.getElementById("maleBtn").classList.toggle("active", sex === "Male");
      document.getElementById("femaleBtn").classList.toggle("active", sex === "Female");
      generateMessage();
      saveData();
    }

    function setTemplate(template) {
      currentTemplate = template;

      ["new", "progress", "consult", "discharge"].forEach(t => {
        document.getElementById("tab-" + t).classList.toggle("active", t === template);
      });

      document.getElementById("templateNote").textContent = templateNotes[template];
      document.getElementById("extraFields").innerHTML = extraFieldHtml[template];

      attachInputListeners();
      loadData();
      generateMessage();
      saveData();
    }

    function formatBullets(text) {
      if (!text) return "- ";
      return text
        .split("\\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map(line => line.startsWith("-") ? line : "- " + line)
        .join("\\n");
    }

    function formatPlainLines(text) {
      return text || "";
    }

    function patientLine() {
      const patient = valueOf("patient");
      const age = valueOf("age");
      return `ผู้ป่วย: ${patient} ${selectedSex} ${age}y`;
    }

    function header(title) {
      return `${title} อ.${valueOf("teacher")}
Ward: ${valueOf("ward")}
${patientLine()}
HN: ${valueOf("hn")}
U/D: ${valueOf("ud")}`;
    }

    function generateNewCase() {
      return `${header("รับใหม่")}
Problem List:
${formatPlainLines(valueOf("problem"))}
Plan:
${formatBullets(valueOf("plan"))}`;
    }

    function generateProgress() {
      return `${header("Progress")}
Progress note:
${formatPlainLines(valueOf("progressNote"))}
Problem List:
${formatPlainLines(valueOf("problem"))}
Plan:
${formatBullets(valueOf("plan"))}`;
    }

    function generateConsult() {
      return `${header("Consult")}
Consult to: ${valueOf("consultTo")}
Consult question:
${formatPlainLines(valueOf("consultQuestion"))}
Problem List:
${formatPlainLines(valueOf("problem"))}
Plan:
${formatBullets(valueOf("plan"))}`;
    }

    function generateDischarge() {
      return `${header("Discharge")}
Diagnosis:
${formatPlainLines(valueOf("dx"))}
Discharge medication:
${formatBullets(valueOf("dischargeMed"))}
Follow-up:
${formatBullets(valueOf("followUp"))}
Problem List:
${formatPlainLines(valueOf("problem"))}
Plan:
${formatBullets(valueOf("plan"))}`;
    }

    function generateMessage() {
      let message = "";

      if (currentTemplate === "new") message = generateNewCase();
      if (currentTemplate === "progress") message = generateProgress();
      if (currentTemplate === "consult") message = generateConsult();
      if (currentTemplate === "discharge") message = generateDischarge();

      document.getElementById("output").value = message;
      document.getElementById("status").textContent = "Generated";
      saveData();
    }

    function fallbackCopy(output) {
      output.removeAttribute("readonly");
      output.select();
      output.setSelectionRange(0, 99999);
      document.execCommand("copy");
      output.setAttribute("readonly", true);
      document.getElementById("status").textContent = "Copied. Paste it into LINE.";
    }

    function copyMessage() {
      generateMessage();
      const output = document.getElementById("output");

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(output.value).then(function() {
          document.getElementById("status").textContent = "Copied. Paste it into LINE.";
        }).catch(function() {
          fallbackCopy(output);
        });
      } else {
        fallbackCopy(output);
      }
    }

    function exportTextFile() {
      generateMessage();
      const text = document.getElementById("output").value;
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      const hn = valueOf("hn") || "case";
      a.href = url;
      a.download = `Inging_Rubcase_${hn}.txt`;
      a.click();

      URL.revokeObjectURL(url);
      document.getElementById("status").textContent = "Exported .txt file";
    }

    function saveTeacherFavorite() {
      const teacher = valueOf("teacher");
      if (!teacher) {
        document.getElementById("status").textContent = "Enter teacher name first.";
        return;
      }

      const saved = JSON.parse(localStorage.getItem("teacherFavorites") || "[]");
      if (!saved.includes(teacher)) saved.push(teacher);
      localStorage.setItem("teacherFavorites", JSON.stringify(saved));
      renderTeacherFavorites();
      document.getElementById("status").textContent = "Teacher favorite saved.";
    }

    function renderTeacherFavorites() {
      const saved = JSON.parse(localStorage.getItem("teacherFavorites") || "[]");
      const list = document.getElementById("teacherList");
      list.innerHTML = saved.map(name => `<option value="${name}"></option>`).join("");
    }

    function allCurrentFields() {
      const extras = Array.from(document.querySelectorAll("#extraFields input, #extraFields textarea")).map(el => el.id);
      return [...baseFields, ...extras];
    }

    function saveData() {
      const data = {
        selectedSex,
        currentTemplate
      };

      allCurrentFields().forEach(id => {
        const el = document.getElementById(id);
        if (el) data[id] = el.value;
      });

      localStorage.setItem("ingingRubcaseData", JSON.stringify(data));
    }

    function loadData() {
      const data = JSON.parse(localStorage.getItem("ingingRubcaseData") || "{}");

      selectedSex = data.selectedSex || "Male";
      document.getElementById("maleBtn").classList.toggle("active", selectedSex === "Male");
      document.getElementById("femaleBtn").classList.toggle("active", selectedSex === "Female");

      allCurrentFields().forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) el.value = data[id];
      });
    }

    function clearCaseOnly() {
      ["patient", "age", "hn", "ud", "problem", "plan"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      Array.from(document.querySelectorAll("#extraFields input, #extraFields textarea")).forEach(el => el.value = "");

      selectedSex = "Male";
      document.getElementById("maleBtn").classList.add("active");
      document.getElementById("femaleBtn").classList.remove("active");

      generateMessage();
      document.getElementById("status").textContent = "Case cleared. Teacher and ward kept.";
    }

    function clearAllData() {
      localStorage.removeItem("ingingRubcaseData");
      baseFields.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = "";
      });

      Array.from(document.querySelectorAll("#extraFields input, #extraFields textarea")).forEach(el => el.value = "");

      selectedSex = "Male";
      currentTemplate = "new";
      setTemplate("new");
      generateMessage();
      document.getElementById("status").textContent = "All data reset.";
    }

    function attachInputListeners() {
      allCurrentFields().forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.removeEventListener("input", generateMessage);
          el.addEventListener("input", generateMessage);
        }
      });
    }

    renderTeacherFavorites();
    attachInputListeners();

    const savedData = JSON.parse(localStorage.getItem("ingingRubcaseData") || "{}");
    if (savedData.currentTemplate) {
      setTemplate(savedData.currentTemplate);
    } else {
      setTemplate("new");
    }

    loadData();
    generateMessage();
  </script>
</body>
</html>
